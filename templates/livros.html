<link rel="stylesheet" href="{{ url_for('static', filename='css/livros.css') }}">

<div class="cadastro-container">
    <h2>Minha Biblioteca</h2>
    <button class="btn-novo" onclick="abrirModal()">+ Adicionar Novo Livro</button>
</div>

<div class="estante-container">
    {% for livro in livros %}
        <div class="card-livro" onclick="abrirModal('{{ livro.id }}', '{{ livro.titulo }}', '{{ livro.autor }}', '{{ livro.sinopse }}', '{{ livro.capa_url }}')">
            
            <div class="capa-wrapper">
                <img src="{{ livro.capa_url }}" alt="Capa">
                <div class="edit-overlay">
                    <span class="pencil-icon">✎</span>
                </div>
            </div>

            <h4 class="livro-titulo">{{ livro.titulo }}</h4>
            <p class="livro-autor">{{ livro.autor }}</p>
            <small class="livro-sinopse">{{ livro.sinopse }}</small>
        </div>
    {% else %}
        <p>Nenhum livro cadastrado ainda.</p>
    {% endfor %}
</div>

<div id="modalLivro" class="modal-overlay">
    <div class="modal-content">
        <span onclick="fecharModal()" class="btn-fechar-x" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:28px;">&times;</span>
        
        <h2 id="titulo_modal_texto">Cadastrar Novo Livro</h2>
        
        <div class="busca-grupo" id="secao_busca">
            <input type="text" id="input_busca" placeholder="Pesquisar título na API...">
            <button type="button" onclick="buscarDadosLivro()">Pesquisar</button>
            <div id="lista_resultados" class="resultados-container"></div>
        </div>

        <form id="form_livro" action="{{ url_for('livro.salvar_livro') }}" method="POST" enctype="multipart/form-data">
            <label>Título:</label>
            <input type="text" name="titulo" id="titulo" required>

            <label>Autor:</label>
            <input type="text" name="autor" id="autor" required>

            <label>Descrição:</label>
            <textarea name="descricao" id="descricao" rows="4"></textarea>

            <div class="campo-foto">
                <label>Capa:</label>
                <input type="text" id="capa_url" name="capa_url" readonly placeholder="URL da Capa">
                
                <label for="file_upload" style="cursor:pointer; color:#9f93be; font-weight:bold; display:block; margin:10px 0;">
                    📁 Escolher imagem do computador
                </label>
                <input type="file" id="file_upload" name="file_upload" accept="image/*" onchange="previewArquivoLocal(this)" style="display:none;">
                
                <div class="preview-box" style="text-align:center;">
                    <img id="preview_capa" src="" style="display:none; width:120px; border-radius:8px; margin-top:10px; border: 1px solid #ddd;">
                </div>
            </div>
            
            <button type="submit" id="btn_submit" class="btn-salvar">Salvar Livro</button>
        </form>
    </div>
</div>
<a href="{{ url_for('home.home_view') }}" class="btn-back" id="link-voltar">
            ← Voltar ao Home
        </a>
<script src="{{ url_for('static', filename='script/livro_api.js') }}"></script>
