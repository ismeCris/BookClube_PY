<div class="cadastro-container">
    <h2>Minha Biblioteca</h2>
    <button class="btn-novo" onclick="abrirModal()">+ Adicionar Novo Livro</button>
</div>

<div class="estante-container" style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
    {% for livro in livros %}
        <div class="card-livro" style="width: 180px; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer;"
             onclick="abrirModal('{{ livro.id }}', '{{ livro.titulo }}', '{{ livro.autor }}', '{{ livro.sinopse }}', '{{ livro.capa_url }}')">
            
            <img src="{{ livro.capa_url }}" alt="Capa" style="width: 150px; height: 220px; object-fit: cover; border-radius: 4px;">
            <h4 style="margin: 10px 0 5px;">{{ livro.titulo }}</h4>
            <p style="font-size: 0.9em; color: #555;">{{ livro.autor }}</p>
            <small style="display: block; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                {{ livro.sinopse }}
            </small>
        </div>
    {% else %}
        <p>Nenhum livro cadastrado ainda.</p>
    {% endfor %}
</div>

<div id="modalLivro" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y: auto;">
    <div class="modal-content" style="background:white; width:90%; max-width:500px; margin:30px auto; padding:25px; border-radius:15px; position:relative;">
        <span onclick="fecharModal()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:28px;">&times;</span>
        
        <h2 id="titulo_modal_texto">Cadastrar Novo Livro</h2>
        
        <div class="busca-grupo" id="secao_busca">
            <input type="text" id="input_busca" placeholder="Pesquisar título na API...">
            <button type="button" onclick="buscarDadosLivro()">Pesquisar</button>
            <div id="lista_resultados" class="resultados-container"></div>
        </div>

        <form action="{{ url_for('livro.salvar_livro') }}" method="POST" enctype="multipart/form-data">>
            <label>Título:</label>
            <input type="text" name="titulo" id="titulo" required style="width:100%; margin-bottom:10px;">

            <label>Autor:</label>
            <input type="text" name="autor" id="autor" required style="width:100%; margin-bottom:10px;">

            <label>Descrição:</label>
            <textarea name="descricao" id="descricao" rows="4" style="width:100%; margin-bottom:10px;"></textarea>

            <div class="campo-foto">
                <label>Capa:</label>
                <input type="text" id="capa_url" name="capa_url" readonly placeholder="URL da Capa" style="width:100%; margin-bottom:5px;">
                
                <label for="file_upload" style="cursor:pointer; color:#9f93be; font-weight:bold; display:block; margin:10px 0;">
                    📁 Escolher imagem do computador
                </label>
                <input type="file" id="file_upload" name="file_upload" accept="image/*" onchange="previewArquivoLocal(this)" style="display:none;">
                
                <div class="preview-box" style="text-align:center;">
                    <img id="preview_capa" src="" style="display:none; width:120px; border-radius:8px; margin-top:10px; border: 1px solid #ddd;">
                </div>
            </div>
            
            <button type="submit" id="btn_submit" style="width:100%; padding:12px; background:#9f93be; color:white; border:none; border-radius:8px; margin-top:15px; cursor:pointer;">
                Salvar Livro
            </button>
        </form>
    </div>
</div>
<script src="{{ url_for('static', filename='script/livro_api.js') }}"></script>
