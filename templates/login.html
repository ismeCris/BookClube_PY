<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

<div class="main-login-container">
    <div class="login-card" id="card-login">
        <div class="image-section">
            <img src="{{ url_for('static', filename='images/pers_dog.jpg') }}">
        </div>

        <div class="form-section">
            <div id="conteudo-formulario">
                <h2>Login</h2>
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div id="toast-container">
                        {% for category, message in messages %}
                            <div class="toast {{ category }}">
                            {{ message }}
                            </div>
                        {% endfor %}
                        </div>
                    {% endif %}
                    {% endwith %}

                 <form action="/auth/login" method="POST">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Seu e-mail" required>
                    </div>
                    <div class="input-group">
                        <label>Senha</label>
                        <input type="password" name="senha" placeholder="Sua senha" required>
                        <a href="#" class="forgot">Esqueceu a senha?</a>
                    </div>
                    
                    <button type="submit" class="btn-login">Log in</button>
                    
                    <div class="divider"><span>Ainda não tem uma conta?</span></div>
                    <button type="button" class="btn-cad" id="btn-ir-cadastro">Criar conta</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='script/login.js') }}"></script>
